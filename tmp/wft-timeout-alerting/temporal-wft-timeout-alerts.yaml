# Temporal Server — Workflow Task Timeout Alerts
#
# Standalone alert file for customers running workloads sensitive to workflow
# task timeouts, particularly those using heavy local-activity patterns.
#
# Grafana alerting provisioning file. Drop into provisioning/alerting/ in your
# Grafana installation alongside any existing Temporal alert files. Alerts load
# automatically on startup or hot-reload.
#
# Prerequisites:
#   - Temporal Server v1.20+ emitting Prometheus metrics
#   - A Grafana datasource named exactly "Prometheus"
#     If your datasource has a different name, replace the datasourceUid value
#     on the lines marked DATASOURCE below.
#
# These alerts fire only when a workflow task timeout has actually occurred —
# no leading-indicator thresholds to tune.
#
# See temporal-wft-timeout-alerts-readme.md for runbook guidance.

apiVersion: 1

groups:
  - orgId: 1
    name: temporal-wft-timeout
    folder: Temporal Server
    interval: 1m
    rules:

      # ---------------------------------------------------------------------------
      # Alert WFT-1 — Workflow Task StartToClose Timeout (PRIMARY)
      #
      # Fires when the History timer queue fires a StartToClose timeout for a
      # normal (non-speculative) workflow task. This is the definitive server-side
      # signal that a WFT exceeded its execution deadline.
      #
      # For local-activity-heavy workloads: fires when the worker's WFT heartbeat
      # loop fails to respond within the workflowTaskTimeout window, causing the
      # server timer to fire and declare the WFT timed out.
      #
      # Server metric: start_to_close_timeout
      # Filter: operation="TimerActiveTaskWorkflowTaskTimeout"
      # Emitted by: History service, timer queue active task executor
      # ---------------------------------------------------------------------------
      - uid: temporal-alert-wft-001
        title: "Temporal: Workflow Task StartToClose Timeout Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus  # DATASOURCE — change to match your Prometheus datasource name or UID
            model:
              editorMode: code
              expr: |
                sum by (namespace) (
                  rate(start_to_close_timeout{
                    namespace=~".+",
                    operation="TimerActiveTaskWorkflowTaskTimeout"
                  }[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: temporal
          component: history
        annotations:
          summary: "Temporal: workflow task StartToClose timeout in namespace {{ $labels.namespace }} ({{ $value | printf \"%.4f\" }} timeouts/s)"
          description: |
            Workflow task StartToClose timeout detected in namespace {{ $labels.namespace }}.
            The server received no workflow task completion or failure response within the
            workflowTaskTimeout deadline (default 10s).

            For workflow tasks running local activities, this can indicate:
            - Total results of all local activities within the workflow task exceeded the
              default gRPC message size limit (4MB), preventing the response from being sent.
            - The workflow task heartbeat sent by the SDK at 80% of the WFT timeout was
              not received by the server, or was throttled, before the timeout fired.

            In both cases, local activities will run again on workflow task retry, potentially
            on a different worker.
        isPaused: false

      # ---------------------------------------------------------------------------
      # Alert WFT-2 — Workflow Task Heartbeat Timeout (COMPANION)
      #
      # Fires when a worker calls RespondWorkflowTaskCompleted but the server has
      # already declared the WFT timed out. This is a consequence of WFT-1 — the
      # worker is still trying to complete a task the server already invalidated.
      #
      # Complements WFT-1: WFT-1 fires when the server timer fires; WFT-2 fires
      # when the worker eventually responds to the already-timed-out WFT.
      #
      # Server metric: workflow_task_heartbeat_timeout_count
      # Emitted by: History service, RespondWorkflowTaskCompleted path
      # ---------------------------------------------------------------------------
      - uid: temporal-alert-wft-002
        title: "Temporal: Workflow Task Heartbeat Timeout Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus  # DATASOURCE — change to match your Prometheus datasource name or UID
            model:
              editorMode: code
              expr: |
                sum by (namespace) (
                  rate(workflow_task_heartbeat_timeout_count{
                    namespace=~".+"
                  }[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: temporal
          component: history
        annotations:
          summary: "Temporal: workflow task heartbeat timeout in namespace {{ $labels.namespace }} ({{ $value | printf \"%.4f\" }} timeouts/s)"
          description: |
            Workflow task heartbeat timeout detected in namespace {{ $labels.namespace }}.
            This fires when local activity or activities, including all their retries,
            ran for more than 30 minutes without completing or failing.

            Local activities should always have a ScheduleToClose timeout set to less
            than 30 minutes — the WorkflowTaskHeartbeatTimeout is the absolute ceiling.
        isPaused: false

      # ---------------------------------------------------------------------------
      # Alert WFT-3 — Workflow Task ScheduleToStart Timeout (WARNING)
      #
      # Fires when a workflow task sits in the task queue and no worker picks it
      # up within the configured schedule-to-start timeout. Lower severity than
      # WFT-1/WFT-2 — indicates a polling or backlog problem rather than an
      # execution timeout.
      #
      # Relevant for workloads where the first batch of local activities must
      # start quickly: a ScheduleToStart timeout means the WFT never even reached
      # a worker, so local activities could not begin at all.
      #
      # Speculative WFT timeouts are intentionally excluded — those are expected
      # transients and do not indicate a real polling problem.
      #
      # Server metric: schedule_to_start_timeout
      # Filter: operation="TimerActiveTaskWorkflowTaskTimeout"
      # Emitted by: History service, timer queue active task executor
      # ---------------------------------------------------------------------------
      - uid: temporal-alert-wft-003
        title: "Temporal: Workflow Task ScheduleToStart Timeout Detected"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: Prometheus  # DATASOURCE — change to match your Prometheus datasource name or UID
            model:
              editorMode: code
              expr: |
                sum by (namespace) (
                  rate(schedule_to_start_timeout{
                    namespace=~".+",
                    operation="TimerActiveTaskWorkflowTaskTimeout"
                  }[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          service: temporal
          component: history
        annotations:
          summary: "Temporal: workflow task ScheduleToStart timeout in namespace {{ $labels.namespace }} ({{ $value | printf \"%.4f\" }} timeouts/s)"
          description: |
            Workflow task ScheduleToStart timeout detected in namespace {{ $labels.namespace }}.
            A workflow task was scheduled on the sticky task queue but was not picked up
            by the owning worker within the sticky schedule-to-start timeout (default 5s,
            configured by the SDK via StickyScheduleToStartTimeout).

            This timeout only applies to workflow tasks on the sticky task queue — normal
            task queue workflow tasks do not have a ScheduleToStart timeout. When this
            fires, the workflow task is rescheduled on the normal task queue.
        isPaused: false
